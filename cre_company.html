<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Company</title>
    <link rel="stylesheet" href="static/bootstrap.min.css">

    
    <link rel="stylesheet" href="static/shared.css">
    
    <link rel="stylesheet" href="static/cre_company.css">
</head>
<body>
     <div class="container-fluid company-container">
        <h2 class="text-center my-4">Create New Company</h2>
        <form id="companyForm" autocomplete="off">
            <div class="row">
                <!-- Left Side: Image Box and First/Third Tables -->
                <div class="col-md-6">
                    <!-- Image Box -->
                    <div class="image-box text-center mb-4">
                        <img id="companyLogo" src="static/img/img2.png" alt="Company Logo" class="img-fluid rounded-circle">
                        <input type="file" id="logoUpload" accept="image/*" style="display: none;">
                        <label for="logoUpload" class="upload-btn btn btn-primary mt-2">Upload Logo</label>
                    </div>

                    <!-- First Table (Left) -->
                    <div class="table-container mb-4">
                        <table class="table table-borderless">
                            <tr>
                                <td><label for="companyName">Company Name:</label></td>
                                <td><input type="text" id="companyName" class="form-control" placeholder="Enter company name" autofocus></td>
                            </tr>
                            <tr>
                                <td><label for="shortName">Short Name:</label></td>
                                <td><input type="text" id="shortName" class="form-control" placeholder="Enter short name"></td>
                            </tr>
                            <tr>
                                <td><label for="gstNo">GST No.:</label></td>
                                <td><input type="text" id="gstNo" class="form-control" placeholder="Enter GST number"></td>
                            </tr>
                            <tr>
                                <td><label for="phone">Phone:</label></td>
                                <td><input type="tel" id="phone" class="form-control" placeholder="Enter phone number"></td>
                            </tr>
                            <tr>
                                <td><label for="cel">Mobile:</label></td>
                                <td><input type="tel" id="cel" class="form-control" placeholder="Enter mobile number"></td>
                            </tr>
                        </table>
                    </div>

                    <!-- Third Table (Left) -->
                    <div class="table-container mb-4">
                        <table class="table table-borderless">
                            <tr>
                                <td><label for="headerName">Header Name:</label></td>
                                <td><input type="text" id="headerName" class="form-control" placeholder="Enter header name"></td>
                            </tr>
                            <tr>
                                <td><label for="address1">Address 1:</label></td>
                                <td><input type="text" id="address1" class="form-control" placeholder="Enter address line 1"></td>
                            </tr>
                            <tr>
                                <td><label for="address2">Address 2:</label></td>
                                <td><input type="text" id="address2" class="form-control" placeholder="Enter address line 2"></td>
                            </tr>
                            <tr>
                                <td><label for="address3">Address 3:</label></td>
                                <td><input type="text" id="address3" class="form-control" placeholder="Enter address line 3"></td>
                            </tr>
                            <tr>
                                <td><label for="panCard">PAN Card:</label></td>
                                <td><input type="text" id="panCard" class="form-control" placeholder="Enter PAN card number"></td>
                            </tr>
                        </table>
                    </div>
                </div>

                <!-- Right Side: Second and Fourth Tables and Button -->
                <div class="col-md-6">
                    <!-- Second Table (Right) -->
                    <div class="table-container mb-4">
                        <table class="table table-borderless">
                            <tr>
                                <td><label for="bankName">Bank Name:</label></td>
                                <td><input type="text" id="bankName" class="form-control" placeholder="Enter bank name"></td>
                            </tr>
                            <tr>
                                <td><label for="accountNo">Account No.:</label></td>
                                <td><input type="text" id="accountNo" class="form-control" placeholder="Enter account number"></td>
                            </tr>
                            <tr>
                                <td><label for="ifscNo">IFSC Code:</label></td>
                                <td><input type="text" id="ifscNo" class="form-control" placeholder="Enter IFSC code"></td>
                            </tr>
                            <tr>
                                <td><label for="branch">Branch:</label></td>
                                <td><input type="text" id="branch" class="form-control" placeholder="Enter branch name"></td>
                            </tr>
                        </table>
                    </div>

                    <!-- Fourth Table (Right) -->
                    <div class="table-container mb-4">
                        <table class="table table-borderless">
                            <tr>
                                <td><label for="ref1">Reference 1:</label></td>
                                <td><input type="text" id="ref1" class="form-control" placeholder="Enter reference 1"></td>
                            </tr>
                            <tr>
                                <td><label for="ref2">Reference 2:</label></td>
                                <td><input type="text" id="ref2" class="form-control" placeholder="Enter reference 2"></td>
                            </tr>
                            <tr>
                                <td><label for="ref3">Reference 3:</label></td>
                                <td><input type="text" id="ref3" class="form-control" placeholder="Enter reference 3"></td>
                            </tr>
                            <tr>
                                <td><label for="ref4">Reference 4:</label></td>
                                <td><input type="text" id="ref4" class="form-control" placeholder="Enter reference 4"></td>
                            </tr>
                        </table>
                    </div>

                    <!-- Submit Button -->
                    <div class="text-right">
                        <button type="submit" class="btn btn-primary" id="saveBtn">Save Company</button>
                    </div>
                </div>
            </div>
        </form>
    </div>

   
<p>Selected colors: <span id="selectedColorsDisplay"></span></p>
  
    <script src="static/shared.js"></script> 
 
    <script src="static/cre_company.js"></script>
 
    <script src="static/bootstrap.min.js"></script> 
</body>
</html>
